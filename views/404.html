<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* CSS for the body and overall page layout */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Container for the content */
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Styling for the large "404" text */
        h1 {
            font-size: 8rem;
            margin: 0;
            color: #e74c3c;
            animation: bounce 1s infinite;
        }

        /* Styling for the main heading text */
        h2 {
            font-size: 2rem;
            margin-top: 20px;
            color: #555;
        }

        /* Styling for the paragraph text */
        p {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #777;
        }

        /* Styling for the interactive button */
        .home-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        /* Hover effect for the button */
        .home-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        /* Keyframe animation for the bouncing "404" */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>We're sorry, but the page you were looking for doesn't exist. It might have been moved or deleted.</p>
        <a href="/" class="home-button">Go to Homepage</a>
    </div>
</body>
</html>
