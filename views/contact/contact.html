<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - EduLibrary</title>
    <link rel="stylesheet" href="../../css/contact.css" />
  </head>
  <body>
    <section class="contact-section">
      <h1>Contact Our Team</h1>
      <p>
        Have questions, feedback, or need support? Fill out the form below and
        we’ll get back to you as soon as possible.
      </p>

      <form
        action="https://formsubmit.co/54719fa5f407a86d02524a347e78105f"
        method="POST"
        class="contact-form"
      >
        <!-- Hidden config inputs -->
        <input
          type="hidden"
          name="_subject"
          value="New EduLibrary Contact Submission"
        />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input
          type="hidden"
          name="_url"
          value="https://yourdomain.com/contact.html"
        />

        <div class="form-group">
          <label for="name">Your Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Enter your name"
          />
        </div>

        <div class="form-group">
          <label for="email">Your Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter your email"
          />
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            required
            placeholder="Type your message here..."
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </section>
  </body>
</html>
